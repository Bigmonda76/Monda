<style>
  :root{
    --bg:#1a1c16; --panel:#26291f; --panel2:#313526; --gold:#d4b45a;

  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:Georgia,'Times New Roman',serif; user-select:none;}
  #app{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#0d0f0a;}
  #hud{position:absolute; top:8px; left:8px; z-index:5; display:flex; align-items:center; gap:12px;
       padding:7px 12px; background:rgba(38,41,31,0.9); border:1px solid #000; border-radius:8px;
       font-size:15px; flex-wrap:wrap; max-width:62vw;
       transform:scale(var(--uis,1)); transform-origin:top left;}
  #hud .title{font-weight:bold; color:var(--gold); font-size:17px; letter-spacing:1px;}
  #hud .stat{background:var(--panel2); padding:3px 10px; border-radius:4px; border:1px solid #000;}
  #hud .stat b{color:var(--gold);}
  #timer{min-width:70px; text-align:center;}
  #timer.low{color:#ff7a5c; font-weight:bold;}
  #main{display:contents;}
  #cwrap{display:contents;}
  canvas#cv{background:#0d0f0a; cursor:default; display:block; touch-action:none;}
  #zoomCtl{position:absolute; bottom:10px; left:10px; z-index:5; display:flex; gap:4px;
           transform:scale(var(--uis,1)); transform-origin:bottom left;}
  #zoomCtl button{width:34px; height:34px; font-size:17px; background:rgba(38,41,31,0.9);
                  color:var(--text); border:1px solid var(--gold); border-radius:6px; cursor:pointer;}
  #zoomCtl button:hover{background:#5d4a1f;}
  #panel{position:absolute; top:8px; right:8px; z-index:5; width:250px; max-height:calc(100vh - 16px);
         background:rgba(38,41,31,0.93); border:1px solid #000; border-radius:8px; padding:10px;
         overflow-y:auto; display:flex; flex-direction:column; gap:8px;
         transform:scale(var(--uis,1)); transform-origin:top right;}
  .card{background:var(--panel2); border:1px solid #000; border-radius:5px; padding:7px 9px; cursor:pointer;}
  .card:hover{border-color:var(--gold);}
  .card.sel{border-color:var(--gold); box-shadow:0 0 6px rgba(212,180,90,.5);}
  .card.dis{opacity:.42; cursor:not-allowed;}
  .card .nm{font-weight:bold;}
  .card .cost{float:right; color:var(--gold);}
  .card .st{font-size:12px; color:var(--dim); margin-top:2px;}
  .btn{background:#5d4a1f; color:var(--text); border:1px solid var(--gold); border-radius:5px;
       padding:9px; font-family:inherit; font-size:15px; cursor:pointer; width:100%;}
  .btn:hover{background:#7a6229;}
  .ptabs{display:flex; gap:4px;}
  .ptab{flex:1; text-align:center; padding:5px 2px; background:var(--panel2); border:1px solid #000;
        border-radius:4px; cursor:pointer; font-size:13px;}
  .ptab.sel{border-color:var(--gold); color:var(--gold);}
  .qlist{font-size:12.5px; color:var(--dim); min-height:40px; background:#1e2018; border-radius:4px; padding:5px 7px;}
  h3{color:var(--gold); font-size:14px; border-bottom:1px solid #444; padding-bottom:3px; margin-top:4px;}
  .hint{font-size:12px; color:var(--dim); font-style:italic;}
  #overlay{position:fixed; inset:0; background:rgba(8,9,6,.88); display:flex; align-items:center;
           justify-content:center; z-index:10; overflow:auto;}
  #overlay.hidden{display:none;}
  .obox{background:var(--panel); border:2px solid var(--gold); border-radius:10px; padding:24px 32px;
        max-width:720px; text-align:center; transform:scale(var(--uis,1)); transform-origin:center;}
  .resrow{display:flex; gap:22px; justify-content:center; align-items:center; margin:10px 0 14px;}
  .rescol{background:var(--panel2); border:1px solid #555; border-radius:8px; padding:10px 18px;}
  .rescol.winner{border-color:var(--gold); box-shadow:0 0 10px rgba(212,180,90,.45);}
  .resname{font-weight:bold; margin-top:4px;}
  .respct{margin-top:4px; font-size:14px;}
  .respct b{color:var(--gold);}
  .resvs{font-size:26px; color:var(--gold);}
  .toptbl{width:100%; border-collapse:collapse; font-size:12.5px; margin:6px 0 14px;}
  .toptbl th{color:var(--gold); border-bottom:1px solid #555; padding:3px 5px; text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.5px;}

  .toptbl .win{border:1.5px solid var(--gold); border-radius:4px; padding:0 4px; background:rgba(212,180,90,0.12);}
  .toptbl canvas{vertical-align:middle; margin-right:3px;}

  .obox h1{color:var(--gold); font-size:26px; margin-bottom:6px; letter-spacing:1px;}
  .obox h2{font-size:19px; margin-bottom:12px;}
  .obox p{color:var(--dim); margin-bottom:14px; font-size:14.5px;}
  .orow{display:flex; gap:8px; justify-content:center; margin-bottom:12px; flex-wrap:wrap;}
  .opt{background:var(--panel2); border:1px solid #555; border-radius:6px; padding:8px 16px; cursor:pointer; font-size:14.5px;}
  .opt.sel{border-color:var(--gold); color:var(--gold); box-shadow:0 0 5px rgba(212,180,90,.4);}
  .olabel{font-size:13px; color:var(--dim); margin:10px 0 4px; text-transform:uppercase; letter-spacing:1px;}
  .ogrid{display:grid; grid-template-columns:1fr; gap:0 26px;}
  @media (orientation: landscape){ .ogrid{grid-template-columns:1fr 1fr;} }
  .obox .btn{width:auto; padding:10px 34px; margin-top:8px;}
  .ver{margin-top:12px; color:var(--dim); font-size:12px;}
  .speedb{background:var(--panel2); border:1px solid #555; color:var(--text); border-radius:4px;

  .speedb.sel{border-color:var(--gold); color:var(--gold);}

  .civrow canvas{flex:none;}
  .csel{background:var(--panel2); color:var(--text); border:1px solid #555; border-radius:6px;

  let b=({1:1550,2:1450,3:1350,4:1250})[np]||1400;

/* ---------- Pomocné ---------- */
function isoX(x,y){return (x-y)*TW/2+OX;}
function isoY(x,y){return (x+y)*TH/2+OY;}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function rnd2(x,y,s){const h=Math.sin(x*127.1+y*311.7+(s||0)*74.7)*43758.5453;return h-Math.floor(h);}
function clampY(v){return Math.max(1,Math.min(ROWS-2,v));}
function terrainAt(x,y){
  if(SEA){ if(x<=1) return 'water'; if(x<=3) return 'beach'; }
  return 'grass';
}
let hillSet=new Set();
function genHills(){
  hillSet=new Set();
  for(let x=17;x<=20;x++) for(let y=9;y<=13;y++) hillSet.add(x+','+y);
  // 2–3 náhodné vyvýšené plošiny — věž na nich má +0,5 dostřelu
  const nP=2+Math.floor(Math.random()*2);
  let guard=0,placed=0;
  while(placed<nP&&guard++<80){
    const w=2+Math.floor(Math.random()*2), h=2+Math.floor(Math.random()*2);
    const x0=5+Math.floor(Math.random()*(15-w)), y0=2+Math.floor(Math.random()*(17-h));
    let ok=true;
    for(let x=x0-1;x<=x0+w&&ok;x++) for(let y=y0-1;y<=y0+h&&ok;y++) if(hillSet.has(x+','+y)) ok=false;
    if(!ok) continue;
    for(let x=x0;x<x0+w;x++) for(let y=y0;y<y0+h;y++) hillSet.add(x+','+y);
    placed++;
  }
}
genHills();
function raiseAt(x,y){return hillSet.has(x+','+y)?10:0;}
function tileFromScreen(mx,my){
  for(const r of [10,0]){
    const fx=((mx-OX)/(TW/2)+(my+r-OY)/(TH/2))/2, fy=((my+r-OY)/(TH/2)-(mx-OX)/(TW/2))/2;
    const x=Math.floor(fx), y=Math.floor(fy);
    if(x>=0&&y>=0&&x<COLS&&y<ROWS&&raiseAt(x,y)===r) return [x,y];
  }
  return [-1,-1];
}
function expandPath(corners){
  const out=[corners[0].slice()];
  for(let i=1;i<corners.length;i++){
    let [x,y]=out[out.length-1]; const [tx,ty]=corners[i];
    while(x!==tx||y!==ty){ if(x!==tx) x+=Math.sign(tx-x); else y+=Math.sign(ty-y); out.push([x,y]); }
  }
  return out;
}

function __genPaths(){
  const two=att2On();

  const rowPool=two?[2,4,7,9,12,14,17,19]:[3,6,9,12,15,18];

  let sides;
  if(S.cfg.allowCross===false){
    // deterministické párování: horní řada→sever, dolní→jih, střední→západ/východ
    const base=(n===1?['W']:n===2?['S','N']:n===3?['S','W','N']:['S','W','N','E']);
    sides=n<=4?base.slice():Array.from({length:n},(_,j)=>['S','W','N','E'][j%4]).reverse();
  } else {

  PATHS={}; PATH_KEYS=[]; PATH_NAMES={}; PATH_OWNER={}; PATH_KEYS1=[]; PATH_KEYS2=[];
  const built1=[], built2=[];

  for(let i=0;i<n;i++){

    let best=null, bestAdj=1e9, bestShared=0;

      const bad=adj+shared*10;

    const k=String(i);
    PATHS[k]=best; PATH_KEYS.push(k); PATH_OWNER[k]=owner;
    (owner===2?PATH_KEYS2:PATH_KEYS1).push(k);
    PATH_NAMES[k]='Cesta '+((owner===2?PATH_KEYS2:PATH_KEYS1).length)+(two?(owner===2?' · Ú2':' · Ú1'):'');
    built.push(best);
  }
  pathSet=occ;
}
function generateMap(){
  resolveCivs();
  genHills();
  for(let tryN=0;tryN<14;tryN++){ __genPaths(); if(__plazaCount()===0&&__lastViol===0) break; }
  const env=CIVS[S.defCiv].env;
  const dc=[[14,6],[13,17],[20,7],[20,16],[15,19],[12,3]].filter(([x,y])=>!pathSet.has(x+','+y)&&!hillSet.has(x+','+y));
  DECOR=dc.sort(()=>Math.random()-0.5).slice(0,3);
  decorSet=new Set(DECOR.map(([x,y])=>x+','+y));
  const used=new Set([...pathSet,...decorSet,TC.x+','+TC.y]);
  function pick(count,x0,x1,y0,y1,avoidHill){
    const out=[]; let guard=0;
    while(out.length<count&&guard++<300){
      const x=x0+Math.floor(Math.random()*(x1-x0+1)), y=y0+Math.floor(Math.random()*(y1-y0+1));
      const key=x+','+y;
      if(used.has(key)||(avoidHill&&hillSet.has(key))||terrainAt(x,y)!=='grass'||x<5) continue;
      used.add(key); out.push([x,y]);
    }
    return out;
  }
  MOUNTS=pick(env.mounts.n,6,21,1,20,true);
  mountSet=new Set(MOUNTS.map(([x,y])=>x+','+y));
  TREES=pick(18,5,21,1,20,true);
  treeSet=new Set(TREES.map(([x,y])=>x+','+y));
  ANIMALS=pick(3,6,14,3,18,true);
  ROCKS=pick(6,5,21,1,20,false);
  BUSHES=pick(7,5,21,1,20,true);
  FLOWERS=env.flowers?pick(14,4,21,1,20,false):[];
  FIELDS=env.fields?pick(2,6,14,4,17,true):[];
  FIELDS.forEach(([x,y])=>decorSet.add(x+','+y));
  buildTerrain();
}

let AC=null, sndLast={};
function sndOn(){ return S.cfg.sound==='on'; }
function ac(){ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function thr(id,ms){ const t=performance.now(); if(sndLast[id]&&t-sndLast[id]<ms) return false; sndLast[id]=t; return true; }
function tone(f,dur,type,vol,f2,delay){
  if(!sndOn()) return;
  const c=ac(), t0=c.currentTime+(delay||0);
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f,t0);
  if(f2) o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t0+dur);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol||0.15,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(c.destination); o.start(t0); o.stop(t0+dur+0.03);
}
function noise(dur,vol,fc,q,delay,slideFc){
  if(!sndOn()) return;
  const c=ac(), t0=c.currentTime+(delay||0);
  const len=Math.max(1,Math.floor(c.sampleRate*dur)), b=c.createBuffer(1,len,c.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const s=c.createBufferSource(); s.buffer=b;
  const f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.setValueAtTime(fc||1000,t0);
  if(slideFc) f.frequency.exponentialRampToValueAtTime(slideFc,t0+dur);
  f.Q.value=q||1;
  const g=c.createGain(); g.gain.setValueAtTime(vol||0.2,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  s.connect(f).connect(g).connect(c.destination); s.start(t0); s.stop(t0+dur);
}

/* ============================================================
   TOP10 — síň slávy (localStorage prohlížeče)
   Bodování:
   Útočník: %HP vojska ×10 + max(0,180−čas)×2
   Obránce: %HP hradu ×10 + ušetřené zlato ÷2 + zabití ×10
   Výhra proti člověku ×1,1. PC výhry se neukládají.
   ============================================================ */
function storageOk(){ try{ return typeof localStorage!=='undefined'&&!!localStorage; }catch(e){ return false; } }
function loadTop(){
  if(!storageOk()) return {att:[],def:[]};
  try{ const d=JSON.parse(localStorage.getItem('td2026_top10')); return (d&&d.att&&d.def)?d:{att:[],def:[]}; }
  catch(e){ return {att:[],def:[]}; }
}
function saveTop(d){ if(storageOk()) try{ localStorage.setItem('td2026_top10',JSON.stringify(d)); }catch(e){} }
function qualifies(list,score){ return list.length<10||score>list[list.length-1].score; }
function tsNow(){
  const d=new Date(), p=v=>String(v).padStart(2,'0');
  return String(d.getFullYear()).slice(2)+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes());
}
function calcScore(B,aWin,aPct,dPct,vsHuman){
  const speed=Math.max(0,180-B.time);
  let s=aWin ? aPct*10+speed*2 : dPct*10+S.budgetD/2+B.killed*10;
  if(vsHuman) s*=1.1;
  return Math.round(s);
}
function civNm(k){ return CIVS[k]?CIVS[k].name:k; }
function topTableHtml(side,list){
  let h='<h2 style="margin-top:8px">'+(side==='att'?'🗡 TOP10 — útočníci':'🏰 TOP10 — obránci')+'</h2>';

  h+='<table class="toptbl"><tr><th>#</th><th>Jméno</th><th>Datum</th><th>Souboj</th><th>Vojsko/Hrad</th><th>Soupeř</th><th>Body</th></tr>';
  list.forEach((e,i)=>{
    const wa=e.winner==='att', ida=side+'_'+i+'_a', idd=side+'_'+i+'_d';
    h+=`<tr><td>${i+1}</td><td><b>${e.name}</b></td><td>${e.ts}</td>
      <td><span class="${wa?'win':''}"><canvas id="${ida}" width="18" height="21"></canvas>${civNm(e.attCiv)}</span>

  return h+'</table>';

function saveScoreDialog(entry,afterFn){
  overlay.className=''; overlay.innerHTML=`
    <div class="obox">
      <h1>🏆 Zápis do TOP10</h1>
      <p>Zadej jméno vítěze (3–8 znaků) a pro potvrzení ho napiš dvakrát stejně.</p>
      <div><input class="nameinp" id="nm1" maxlength="8" placeholder="Jméno"></div>
      <div><input class="nameinp" id="nm2" maxlength="8" placeholder="Jméno znovu"></div>
      <p class="hint" id="nmErr" style="min-height:18px"></p>
      <button class="btn" id="nmSave">Uložit</button>
      <button class="btn" id="nmBack" style="margin-left:8px">Zpět</button>
    </div>`;
  const n1=document.getElementById('nm1'), n2=document.getElementById('nm2'), err=document.getElementById('nmErr');
  document.getElementById('nmSave').onclick=()=>{
    const a=(n1.value||'').trim(), b=(n2.value||'').trim();
    if(a.length<3||a.length>8){ err.textContent='Jméno musí mít 3–8 znaků.'; n1.className='nameinp err'; return; }
    if(a!==b){ err.textContent='Jména se neshodují — napiš je dvakrát stejně.'; n2.className='nameinp err'; return; }
    entry.name=a;
    const d=loadTop(), key=entry.winner==='att'?'att':'def';
    d[key].push(entry);
    d[key].sort((x,y)=>y.score-x.score);
    d[key]=d[key].slice(0,10);
    saveTop(d);
    if(S.battle) S.battle.saved=true;
    sfx.fanfare();
    afterFn();
  };
  document.getElementById('nmBack').onclick=afterFn;
}

/* ---------- Tok hry ---------- */
function startGame(){
  overlay.className='hidden';
  if(S.keepMap){ S.keepMap=false; }
  else generateMap();
  S.attackPlan={}; PATH_KEYS1.forEach(k=>S.attackPlan[k]=[]);
  S.attackPlan2={}; PATH_KEYS2.forEach(k=>S.attackPlan2[k]=[]);
  S.budgetA=attBudgetFor(PATH_KEYS1.length);
  S.budgetA2=att2On()?attBudgetFor(PATH_KEYS2.length):0;
  S.towers=[]; S.budgetD=DEF_BUDGET*(att2On()?2:1);
  S.curAtt=1; S.selPath=PATH_KEYS1[0];
  S.done={att:false,att2:att2On()?false:true,def:false};
  // Útočník 2 setuje vždy po Útočníkovi 1; obránce dle volby „Kdo začíná"
  S.order=S.cfg.first==='defender'?['def','att','att2']:['att','att2','def'];
  S.lowNotice=false;
  nextPhase();
}
function nextPhase(){
  const nxt=S.order.find(p=>!S.done[p]);
  if(!nxt){ startBattle(); return; }
  if(nxt==='def') startPrepDefense();
  else if(nxt==='att') startPrepAttack();
  else startPrepAttack2();
}
function finishAttack(){ S.done.att=true; S.lowNotice=false; nextPhase(); }
function finishAttack2(){ S.done.att2=true; S.lowNotice=false; nextPhase(); }
function finishDefense(){ S.done.def=true; S.lowNotice=false; nextPhase(); }
function curFinishAttack(){ (S.curAtt===2?finishAttack2:finishAttack)(); }
function cheapest(obj){return Math.min(...Object.values(obj).map(o=>o.cost));}
// při vyčerpání zlata se hra automaticky předá dál (dalšímu hráči, nebo rovnou do bitvy)
function checkBudgetA(){
  if(budA()>=cheapest(UF(S.curAtt))) return;
  sfx.coins(); curFinishAttack();
}
function checkBudgetD(){
  if(S.budgetD>=cheapest(TOWERS)) return;
  sfx.coins(); finishDefense();
}

/* ---------- Fáze: příprava útoku ---------- */
function startPrepAttack(){
  S.curAtt=1; S.phase='prepAttack'; S.timeLeft=S.cfg.time; S.timerOn=false; S.selPath=PATH_KEYS1[0];
  const an=CIVS[S.attCiv].name;
  const role=att2On()?'útočník 1':'útočník';
  if(S.cfg.attacker==='pc'){
    civAutoOverlay(S.attCiv,role+' — počítač','Počítač připravuje útok…','Vojevůdce národa '+an+' svolává vojsko.',1100,()=>{
      S.attackPlan=aiAttackPlan(); S.budgetA=0; finishAttack();
    });
  } else {
    civOverlay(S.attCiv,role,'Připrav vojsko','Vyber cestu ('+PATH_KEYS1.length+') a nakupuj jednotky. Rozpis vojska sleduj vlevo na mapě. Přípravu ostatních hráčů nevidíš. '+limitText(),'Začít přípravu',()=>{
      S.timerOn=S.cfg.time>0; buildAttackPanel();
    });
  }
  updateHud();
}
function startPrepAttack2(){
  S.curAtt=2; S.phase='prepAttack2'; S.timeLeft=S.cfg.time; S.timerOn=false; S.selPath=PATH_KEYS2[0];
  civOverlay(S.att2Civ,'útočník 2','Připrav vojsko','Vyber cestu ('+PATH_KEYS2.length+') a nakupuj jednotky. Rozpis vojska sleduj vlevo na mapě. Přípravu ostatních hráčů nevidíš. '+limitText(),'Začít přípravu',()=>{
    S.timerOn=S.cfg.time>0; buildAttackPanel();
  });
  updateHud();
}
function buildAttackPanel(){
  const AU=UF(S.curAtt), keys=keysOf(S.curAtt), plan=planOf(S.curAtt);
  panel.innerHTML='<h3>'+CIVS[civOf(S.curAtt)].name+(att2On()?' — útočník '+S.curAtt:'')+' — cesta útoku</h3>';
  const tabs=document.createElement('div'); tabs.className='ptabs';
  keys.forEach((k,idx)=>{
    const d=document.createElement('div'); d.className='ptab'+(S.selPath===k?' sel':'');
    d.textContent=(idx+1);
    d.title=PATH_NAMES[k];
    d.onclick=()=>{S.selPath=k; sfx.menuClick(); buildAttackPanel();};
    tabs.appendChild(d);
  });
  panel.appendChild(tabs);
  const undo=document.createElement('button'); undo.className='btn'; undo.style.padding='6px'; undo.style.fontSize='13px'; undo.style.background='var(--panel2)';
  undo.textContent='↩ Odebrat poslední jednotku';
  undo.onclick=()=>{ const arr=plan[S.selPath]; if(arr.length){ budAAdd(AU[arr.pop()].cost); S.lowNotice=false; sfx.coins(); buildAttackPanel(); } };
  panel.appendChild(undo);
  const h=document.createElement('h3'); h.textContent='Jednotky (klik = přidat)'; panel.appendChild(h);
  for(const k in AU){
    const u=AU[k], c=document.createElement('div');
    c.className='card'+(u.cost>budA()?' dis':'');
    c.innerHTML=`<span class="cost">${u.cost} 🪙</span><span class="nm">${u.name}</span>
      <div class="st">HP ${u.hp} · síla ${u.dps} · rychlost ${u.speed} · ${u.desc}</div>`;
    c.onclick=()=>{ if(u.cost<=budA()){ budASub(u.cost); plan[S.selPath].push(k); sfx.place(k); buildAttackPanel(); checkBudgetA(); } };
    panel.appendChild(c);
  }
  const done=document.createElement('button'); done.className='btn'; done.textContent='✓ Vojsko připraveno';
  done.onclick=curFinishAttack; panel.appendChild(done);
  updateHud();
}
function aiAttackPlan(){
  const KS=PATH_KEYS1, AU=UF(1);
  const plan={}; KS.forEach(k=>plan[k]=[]);
  let b=attBudgetFor(KS.length), leaders=0;
  const pref=KS.slice().sort(()=>Math.random()-0.5).slice(0,Math.min(2,KS.length));
  const w=['basic','basic','basic','ranged','ranged','elite','elite','siege','leader'];
  let guard=0;
  while(guard++<200){
    const aff=w.filter(k=>AU[k].cost<=b && !(k==='leader'&&leaders>=2));
    if(!aff.length) break;
    const k=aff[Math.floor(Math.random()*aff.length)];
    if(k==='leader') leaders++;
    b-=AU[k].cost;
    const pk=Math.random()<0.8?pref[Math.floor(Math.random()*pref.length)]:KS[Math.floor(Math.random()*KS.length)];
    plan[pk].push(k);
  }
  return plan;
}

/* ---------- Fáze: příprava obrany ---------- */
function startPrepDefense(){
  S.phase='prepDefense'; S.timeLeft=S.cfg.time; S.timerOn=false; S.selTower=null;
  const dn=CIVS[S.defCiv].name;
  if(S.cfg.defender==='pc'){
    civAutoOverlay(S.defCiv,'obránce — počítač','Počítač připravuje obranu…',dn+' osazují věže podél cest.',1100,()=>{
      aiDefense(); finishDefense();
    });
  } else {
    civOverlay(S.defCiv,'obránce','Připrav obranu','Nepřítel se blíží! Rozmísti věže podél cest k Town Center. Složení nepřátelského vojska nevidíš. '+limitText(),'Začít přípravu',()=>{
      S.timerOn=S.cfg.time>0; buildDefensePanel();
    });
  }
  updateHud();
}
function buildDefensePanel(){
  panel.innerHTML='<h3>'+CIVS[S.defCiv].name+' — obranné stavby</h3>';
  for(const k in TOWERS){
    const t=TOWERS[k], c=document.createElement('div');
    c.className='card'+(S.selTower===k?' sel':'')+(t.cost>S.budgetD?' dis':'');
    c.innerHTML=`<span class="cost">${t.cost} 🪙</span><span class="nm">🏰 ${t.name}</span>
      <div class="st">Dostřel ${t.range} · zásah ${t.dmg} · ${t.desc}</div>`;
    c.onclick=()=>{ if(t.cost<=S.budgetD){ S.selTower=(S.selTower===k?null:k); buildDefensePanel(); } };
    panel.appendChild(c);
  }
  const hint=document.createElement('p'); hint.className='hint';
  hint.textContent='Vyber věž a klikni na volnou dlaždici (ne na cestu). Věž na návrší má +0,5 dostřelu. Pravý klik věž odstraní (vrátí zlato).';
  panel.appendChild(hint);
  const done=document.createElement('button'); done.className='btn'; done.textContent='✓ Obrana připravena';
  done.onclick=finishDefense; panel.appendChild(done);
  updateHud();
}
function canBuild(x,y){
  if(x<4||y<0||x>=COLS||y>=ROWS) return false;
  if(terrainAt(x,y)!=='grass') return false;
  if(pathSet.has(x+','+y)||treeSet.has(x+','+y)||decorSet.has(x+','+y)||mountSet.has(x+','+y)) return false;
  if(x===TC.x&&y===TC.y) return false;
  if(S.towers.some(t=>t.x===x&&t.y===y)) return false;
  return true;
}
function aiDefense(){
  const cand=[];
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++){
    if(!canBuild(x,y)) continue;
    let near=false;
    for(const key of PATH_KEYS){ for(const [px,py] of PATHS[key]){ if(Math.abs(px-x)<=2&&Math.abs(py-y)<=2){near=true;break;} } if(near)break; }
    if(near) cand.push([x,y]);
  }
  const w=['watch','watch','guard','guard','unique','unique','siege'];
  let guard=0;
  while(guard++<100 && cand.length){
    const aff=w.filter(k=>TOWERS[k].cost<=S.budgetD);
    if(!aff.length) break;
    const k=aff[Math.floor(Math.random()*aff.length)];
    cand.sort((a,b)=>(Math.hypot(a[0]-TC.x,a[1]-TC.y))-(Math.hypot(b[0]-TC.x,b[1]-TC.y)));
    const i=Math.random()<0.7?Math.floor(Math.random()*Math.min(10,cand.length)):Math.floor(Math.random()*cand.length);
    const [x,y]=cand.splice(i,1)[0];
    if(!canBuild(x,y)) continue;
    S.towers.push({type:k,x,y,cd:0});
    S.budgetD-=TOWERS[k].cost;
  }
}

function startBattle(){
  overlay.className='hidden';
  S.phase='battle'; S.timerOn=false; S.selTower=null;
  const queues={};
  const two=att2On();
  let total=0;
  const totalHp={1:0,2:0};
  for(const k of PATH_KEYS){
    const owner=PATH_OWNER[k]||1;
    queues[k]={list:(planOf(owner)[k]||[]).slice(), t:0.5, owner};
    total+=queues[k].list.length;
    queues[k].list.forEach(u=>totalHp[owner]+=UF(owner)[u].hp);
  }
  S.battle={units:[], shots:[], blasts:[], queues, tcHp:TC_HP, killed:0, total, totalHp,
            dmg:{1:0,2:0}, two, time:0};
  S.towers.forEach(t=>t.cd=0);
  panel.innerHTML='<h3>Bitva</h3><p class="hint">'+CIVS[S.attCiv].name+(two?' a '+CIVS[S.att2Civ].name:'')+' '+(SEA?'se vyloďují':'vyrážejí z tábora')+'! Vydrží obrana národa '+CIVS[S.defCiv].name+'?</p>'+
    '<div class="qlist" id="bstat"></div>';
  hudSpeed.style.display=''; hudTc.style.display='';
  updateHud();
}
function spawnUnit(pathKey,typeKey){
  const owner=PATH_OWNER[pathKey]||1;
  const p=PATHS[pathKey], u=UF(owner)[typeKey];
  S.battle.units.push({type:typeKey, path:pathKey, owner, wp:0, x:p[0][0], y:p[0][1],
    hp:u.hp, max:u.hp, atk:false, ph:Math.random()*7});
}
function battleTick(dt){
  const B=S.battle; if(!B) return;
  B.time+=dt; B.burn=false;
  for(const k of PATH_KEYS){
    const q=B.queues[k];
    if(q.list.length){ q.t-=dt; if(q.t<=0){ const ut=q.list.shift(); spawnUnit(k,ut); sfx.spawn(ut); q.t=1.25; } }
  }
  for(const u of B.units){
    const d=UF(u.owner)[u.type];
    if(d.regen) u.hp=Math.min(u.max,u.hp+d.regen*dt);
    const dTc=dist(u.x,u.y,TC.x,TC.y);
    if(dTc<=d.range+0.55){ u.atk=true; B.tcHp-=d.dps*dt; B.dmg[u.owner]+=d.dps*dt; B.burn=true; }
    else{
      u.atk=false;
      const p=PATHS[u.path];
      if(u.wp<p.length-1){
        const [tx,ty]=p[u.wp+1];
        const dd=dist(u.x,u.y,tx,ty), step=d.speed*dt;
        if(dd<=step){ u.x=tx; u.y=ty; u.wp++; }
        else{ u.x+=(tx-u.x)/dd*step; u.y+=(ty-u.y)/dd*step; }
      } else { u.atk=true; B.tcHp-=d.dps*dt; B.dmg[u.owner]+=d.dps*dt; B.burn=true; }
    }
  }
  for(const j of B.units){
    const jd=UF(j.owner)[j.type];
    if(jd.aura&&j.hp>0){
      // vůdce léčí jen jednotky vlastního vojska
      for(const u of B.units){ if(u!==j&&u.owner===j.owner&&u.hp>0&&dist(u.x,u.y,j.x,j.y)<=2.5) u.hp=Math.min(u.max,u.hp+jd.aura*dt); }
    }
  }
  for(const t of S.towers){
    const d=TOWERS[t.type]; t.cd-=dt;
    if(t.cd>0) continue;
    const rng=d.range+(hillSet.has(t.x+','+t.y)?0.5:0);
    let best=null,bd=1e9;
    for(const u of B.units){ if(u.hp<=0) continue; const dd=dist(t.x,t.y,u.x,u.y); if(dd<=rng&&dd<bd){bd=dd;best=u;} }
    if(best){
      t.cd=1/d.rate;
      sfx.shot(d.kind);
      B.shots.push({x1:t.x,y1:t.y,h:d.h,x2:best.x,y2:best.y,t:0.28,dur:0.28,kind:d.kind});
      if(d.kind==='siege'){
        B.blasts.push({x:best.x,y:best.y,t:0.3,r:d.splash});
        for(const u of B.units){ if(u.hp>0&&dist(u.x,u.y,best.x,best.y)<=d.splash) u.hp-=d.dmg; }
        sfx.hit();
      } else {
        best.hp-=Math.max(1,d.dmg-UF(best.owner)[best.type].pa);
        sfx.hit();
      }
    }
  }
  if(B.burn&&Math.random()<dt*2.5) sfx.crackle();
  const before=B.units.length;
  B.units=B.units.filter(u=>u.hp>0);
  if(B.units.length<before) sfx.die();
  B.killed+=before-B.units.length;
  B.shots.forEach(s=>s.t-=dt); B.shots=B.shots.filter(s=>s.t>0);
  B.blasts.forEach(b=>b.t-=dt); B.blasts=B.blasts.filter(b=>b.t>0);
  if(B.tcHp<=0&&B.collapse===undefined){ B.tcHp=0; B.collapse=1.8; sfx.crumble(); }
  if(B.collapse!==undefined){
    B.tcHp=0; B.collapse-=dt;
    if(Math.random()<dt*5) sfx.crackle();
    if(B.collapse<=0){ endBattle('attacker'); return; }
  }
  const empty=PATH_KEYS.every(k=>!B.queues[k].list.length);
  if(empty&&!B.units.length&&B.collapse===undefined) endBattle('defender');
  const st=document.getElementById('bstat');
  if(st){
    let sh=`Zabito útočníků: <b>${B.killed} / ${B.total}</b><br>Town Center: <b>${Math.ceil(B.tcHp)} / ${TC_HP}</b>`;
    if(B.two) sh+=`<br>Poškození — ${CIVS[S.attCiv].name}: <b>${Math.round(B.dmg[1])}</b> · ${CIVS[S.att2Civ].name}: <b>${Math.round(B.dmg[2])}</b>`;
    st.innerHTML=sh;
  }
}
function endBattle(winner){
  S.phase='result';
  const B=S.battle;
  const two=B.two;
  const aWin=winner==='attacker';
  // při dvou útočnících vítězí ten s větším poškozením Town Centeru
  const winAtt=aWin?(two?(B.dmg[1]>=B.dmg[2]?1:2):1):0;
  const remain={1:0,2:0};
  B.units.forEach(u=>remain[u.owner]+=Math.max(0,u.hp));
  for(const k of PATH_KEYS){ const o=PATH_OWNER[k]||1; B.queues[k].list.forEach(u=>remain[o]+=UF(o)[u].hp); }
  const pctOf=o=>B.totalHp[o]?Math.round(remain[o]/B.totalHp[o]*100):0;
  const aPct=pctOf(1);
  const dPct=Math.round(Math.max(0,B.tcHp)/TC_HP*100);
  const an=CIVS[S.attCiv].name, dn=CIVS[S.defCiv].name, an2=two?CIVS[S.att2Civ].name:'';
  const title=aWin?('🔥 '+(winAtt===2?an2:an)+' zvítězili!'):('🏰 '+dn+' ubránili!');
  const card=(civ,label,body,isWin,erbId)=>`
        <div class="rescol ${isWin?'winner':''}">
          <canvas id="${erbId}" width="54" height="62"></canvas>
          <div class="resname">${CIVS[civ].name}</div>
          <div class="hint">${label}</div>
          <div class="respct">${body}</div>
        </div>`;
  let cards=card(S.attCiv,two?'útočník 1':'útočník','Vojsko: <b>'+aPct+' %</b> HP'+(two?'<br>Poškození: <b>'+Math.round(B.dmg[1])+'</b>':''),aWin&&winAtt===1,'erbRA');
  if(two) cards+=card(S.att2Civ,'útočník 2','Vojsko: <b>'+pctOf(2)+' %</b> HP<br>Poškození: <b>'+Math.round(B.dmg[2])+'</b>',aWin&&winAtt===2,'erbRA2');
  cards+='<div class="resvs">⚔</div>'+card(S.defCiv,'obránce','Hrad: <b>'+dPct+' %</b> HP',!aWin,'erbRD');
  // TOP10: jen výhry člověka a jen hra dvou hráčů
  const winnerHuman=aWin ? S.cfg.attacker==='human' : S.cfg.defender==='human';
  const vsHuman=aWin ? S.cfg.defender==='human' : S.cfg.attacker==='human';
  const score=two?0:calcScore(B,aWin,aPct,dPct,vsHuman);
  const d10=loadTop();
  const canSave=!two&&winnerHuman&&storageOk()&&!B.saved&&qualifies(aWin?d10.att:d10.def,score);
  overlay.className=''; overlay.innerHTML=`
    <div class="obox">
      <h1>${title}</h1>
      <p>${aWin?'Town Center lehl popelem.':'Poslední útočník padl před hradbami.'}</p>
      <div class="resrow">${cards}</div>
      <p>Zabito útočníků: ${B.killed} / ${B.total} · Délka bitvy: ${B.time.toFixed(0)} s${two?'':' · Body vítěze: <b style="color:var(--gold)">'+score+'</b>'}</p>
      ${canSave?'<button class="btn" id="oTop" style="margin-bottom:8px">🏆 Uložit vítězství do TOP10</button><br>':''}
      <button class="btn" id="oAgain">Nová hra na nové mapě</button>
      <button class="btn" id="oSame" style="margin-left:8px">Odveta na stejné mapě</button>
      <button class="btn" id="oShow" style="margin-left:8px">🏆 TOP10</button>
      <div class="ver">© MondAI · ${VERSION}</div>
    </div>`;
  drawErb(document.getElementById('erbRA'),S.attCiv);
  if(two) drawErb(document.getElementById('erbRA2'),S.att2Civ);
  drawErb(document.getElementById('erbRD'),S.defCiv);
  const endMenu=(keep)=>{ hudSpeed.style.display='none'; hudTc.style.display='none'; S.keepMap=keep; showMenu(); };
  document.getElementById('oAgain').onclick=()=>endMenu(false);
  document.getElementById('oSame').onclick=()=>endMenu(true);
  document.getElementById('oShow').onclick=()=>{ sfx.menuClick(); showTop10('Zpět na výsledek',()=>endBattle(winner)); };
  if(canSave){
    document.getElementById('oTop').onclick=()=>{
      sfx.coins();
      const entry={name:'', ts:tsNow(), attCiv:S.attCiv, defCiv:S.defCiv, winner:aWin?'att':'def',
                   aPct, dPct, score, vsHuman};
      saveScoreDialog(entry,()=>{ showTop10('Zpět na výsledek',()=>endBattle(winner)); });
    };
  }
}

/* ---------- HUD a časovač ---------- */
function fmtT(s){ s=Math.max(0,Math.ceil(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function updateHud(){
  const an=CIVS[S.attCiv]?CIVS[S.attCiv].name:'útočník', dn=CIVS[S.defCiv]?CIVS[S.defCiv].name:'obránce';
  const an2=S.att2Civ&&CIVS[S.att2Civ]?CIVS[S.att2Civ].name:'útočník 2';
  const ph={menu:'Menu', prepAttack:'Příprava útoku — '+an+(att2On()?' (Ú1)':''),
            prepAttack2:'Příprava útoku — '+an2+' (Ú2)', prepDefense:'Příprava obrany — '+dn,
            battle:'Bitva', result:'Konec'}[S.phase];
  hudPhase.textContent=ph;
  if(S.phase==='prepAttack') hudGold.innerHTML='Zlato: <b>'+S.budgetA+'</b>';
  else if(S.phase==='prepAttack2') hudGold.innerHTML='Zlato: <b>'+S.budgetA2+'</b>';
  else if(S.phase==='prepDefense') hudGold.innerHTML='Zlato: <b>'+S.budgetD+'</b>';
  else hudGold.innerHTML='Zlato: <b>—</b>';
  const prep=(S.phase==='prepAttack'||S.phase==='prepAttack2'||S.phase==='prepDefense');
  hudTimer.textContent=S.timerOn?fmtT(S.timeLeft):(prep&&S.cfg.time===0?'∞':'—');
  hudTimer.className=(S.timerOn&&S.timeLeft<=15)?'low':'';
  if(S.battle) hudTc.innerHTML='Town Center: <b>'+Math.ceil(S.battle.tcHp)+'</b>';
}
function tickTimer(dt){
  if(!S.timerOn||S.cfg.time===0) return;
  S.timeLeft-=dt;
  if(S.timeLeft<=0){
    S.timerOn=false;
    if(S.phase==='prepAttack') finishAttack();
    else if(S.phase==='prepAttack2') finishAttack2();
    else if(S.phase==='prepDefense') finishDefense();
  }
}

/* ---------- Kamera: zoom a posun ---------- */
function clampCam(){
  CAM.z=Math.max(1,Math.min(2.5,CAM.z));
  CAM.x=Math.max(0,Math.min(VIEW_W-VIEW_W/CAM.z,CAM.x));
  CAM.y=Math.max(0,Math.min(VIEW_H-VIEW_H/CAM.z,CAM.y));
}
function setZoom(z,wx,wy,mx,my){
  CAM.z=z; clampCam();
  if(wx!==undefined){ CAM.x=wx-mx/CAM.z; CAM.y=wy-my/CAM.z; clampCam(); }
}
function zoomCenter(f){
  const wx=CAM.x+(VIEW_W/2)/CAM.z, wy=CAM.y+(VIEW_H/2)/CAM.z;
  setZoom(CAM.z*f,wx,wy,VIEW_W/2,VIEW_H/2);
}
function screenToView(e){
  const r=cv.getBoundingClientRect();
  return [(e.clientX-r.left)*(VIEW_W/r.width),(e.clientY-r.top)*(VIEW_H/r.height)];
}
// kolečko i ctrl+kolečko (= pinch na precision touchpadu) → zoom mapy, browser zoom se neaktivuje
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const [mx,my]=screenToView(e);
  const wx=CAM.x+mx/CAM.z, wy=CAM.y+my/CAM.z;
  const f=Math.exp(-e.deltaY*(e.ctrlKey?0.01:0.0016));
  setZoom(CAM.z*f,wx,wy,mx,my);
},{passive:false});
// dotykový pinch (touchscreen)
let pinch=null;
function tDist(e){return Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
cv.addEventListener('touchstart',e=>{ if(e.touches.length===2){ e.preventDefault(); pinch={d:tDist(e),z:CAM.z}; } },{passive:false});
cv.addEventListener('touchmove',e=>{
  if(pinch&&e.touches.length===2){
    e.preventDefault();
    const r=cv.getBoundingClientRect();
    const mx=((e.touches[0].clientX+e.touches[1].clientX)/2-r.left)*(VIEW_W/r.width);
    const my=((e.touches[0].clientY+e.touches[1].clientY)/2-r.top)*(VIEW_H/r.height);
    const wx=CAM.x+mx/CAM.z, wy=CAM.y+my/CAM.z;
    setZoom(pinch.z*tDist(e)/pinch.d,wx,wy,mx,my);
  }
},{passive:false});
cv.addEventListener('touchend',()=>{pinch=null;});
// Safari gesta
cv.addEventListener('gesturestart',e=>e.preventDefault());
cv.addEventListener('gesturechange',e=>e.preventDefault());
// posun: prostřední tlačítko myši + šipky
let panDrag=null;
cv.addEventListener('mousedown',e=>{ if(e.button===1&&CAM.z>1){ e.preventDefault(); panDrag={x:e.clientX,y:e.clientY,cx:CAM.x,cy:CAM.y}; } });
window.addEventListener('mousemove',e=>{
  if(panDrag){
    const r=cv.getBoundingClientRect();
    CAM.x=panDrag.cx-(e.clientX-panDrag.x)*(VIEW_W/r.width)/CAM.z;
    CAM.y=panDrag.cy-(e.clientY-panDrag.y)*(VIEW_H/r.height)/CAM.z;
    clampCam();
  }
});
window.addEventListener('mouseup',()=>{panDrag=null;});
window.addEventListener('keydown',e=>{
  if(S.phase==='menu') return;
  const st=30/CAM.z; let used=true;
  if(e.key==='ArrowLeft')CAM.x-=st; else if(e.key==='ArrowRight')CAM.x+=st;
  else if(e.key==='ArrowUp')CAM.y-=st; else if(e.key==='ArrowDown')CAM.y+=st;
  else if(e.key==='+'||e.key==='=')zoomCenter(1.15); else if(e.key==='-')zoomCenter(1/1.15);
  else if(e.key==='0'){CAM.z=1;CAM.x=0;CAM.y=0;} else used=false;
  if(used){e.preventDefault();clampCam();}
});
document.getElementById('zin').onclick=()=>zoomCenter(1.25);
document.getElementById('zout').onclick=()=>zoomCenter(1/1.25);
document.getElementById('zreset').onclick=()=>{CAM.z=1;CAM.x=0;CAM.y=0;};
// visual viewport (pinch-zoom prohlížeče, který nemění Lupu) → panely zůstanou ve viditelné oblasti
function applyViewportUI(){
  const vv=window.visualViewport; if(!vv) return;
  const hudEl=document.getElementById('hud'), zc=document.getElementById('zoomCtl');
  if(Math.abs(vv.scale-1)<0.03){
    hudEl.style.cssText=''; panel.style.cssText=''; zc.style.cssText='';
    return;
  }
  const u=Math.max(0.5,Math.min(1,(vv.width-16)/VIEW_W));
  const s=Math.max(0.4,u/vv.scale);
  hudEl.style.left=(vv.offsetLeft+6)+'px'; hudEl.style.top=(vv.offsetTop+6)+'px';
  hudEl.style.transform='scale('+s+')'; hudEl.style.transformOrigin='top left';
  panel.style.right='auto'; panel.style.left=(vv.offsetLeft+vv.width-6-250*s)+'px';
  panel.style.top=(vv.offsetTop+6)+'px'; panel.style.maxHeight=(vv.height-12)/s+'px';
  panel.style.transform='scale('+s+')'; panel.style.transformOrigin='top left';
  zc.style.left=(vv.offsetLeft+6)+'px'; zc.style.bottom='auto';
  zc.style.top=(vv.offsetTop+vv.height-6-34*s)+'px';
  zc.style.transform='scale('+s+')'; zc.style.transformOrigin='top left';
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',applyViewportUI);
  window.visualViewport.addEventListener('scroll',applyViewportUI);
}

/* ---------- Vstup ---------- */
cv.addEventListener('mousemove',e=>{
  const [mx,my]=screenToView(e);
  S.hover=tileFromScreen(CAM.x+mx/CAM.z,CAM.y+my/CAM.z);
});
cv.addEventListener('click',e=>{
  if(S.phase!=='prepDefense'||!S.selTower) return;
  const [x,y]=S.hover;
  if(canBuild(x,y)&&TOWERS[S.selTower].cost<=S.budgetD){
    S.towers.push({type:S.selTower,x,y,cd:0});
    S.budgetD-=TOWERS[S.selTower].cost;
    sfx.build(S.towers[S.towers.length-1].type);
    if(TOWERS[S.selTower].cost>S.budgetD) S.selTower=null;
    buildDefensePanel();
    checkBudgetD();
  }
});
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(S.phase!=='prepDefense') return;
  const [x,y]=S.hover;
  const i=S.towers.findIndex(t=>t.x===x&&t.y===y);
  if(i>=0){ S.budgetD+=TOWERS[S.towers[i].type].cost; S.lowNotice=false; sfx.coins(); S.towers.splice(i,1); buildDefensePanel(); }
});

/* ============================================================
   VYKRESLOVÁNÍ — izometrická grafika ve stylu AoE II
   ============================================================ */
function diamondPath(c,sx,sy){
  c.beginPath();
  c.moveTo(sx,sy); c.lineTo(sx+TW/2,sy+TH/2); c.lineTo(sx,sy+TH); c.lineTo(sx-TW/2,sy+TH/2);
  c.closePath();
}
function drawDiamond(c,x,y,raise,fill,stroke){
  const sx=isoX(x,y), sy=isoY(x,y)-raise;
  diamondPath(c,sx,sy);
  if(fill){c.fillStyle=fill; c.fill();}
  if(stroke){c.strokeStyle=stroke; c.lineWidth=1; c.stroke();}
}

/* --- Předrenderovaný statický terén (dle prostředí obránce) --- */
function buildTerrain(){
  const env=CIVS[S.defCiv].env;
  tx2.clearRect(0,0,VIEW_W,VIEW_H);
  for(let s=0;s<=COLS+ROWS-2;s++){
    for(let x=0;x<COLS;x++){
      const y=s-x; if(y<0||y>=ROWS) continue;
      const ter=terrainAt(x,y), key=x+','+y, raise=raiseAt(x,y);
      const sx=isoX(x,y), sy=isoY(x,y)-raise;
      const v=rnd2(x,y,1);
      let base, spek1, spek2;
      if(ter==='water'){ base=x===0?'#173f58':'#1f4f6d'; spek1='rgba(255,255,255,0.07)'; spek2='rgba(0,0,0,0.12)'; }
      else if(ter==='beach'){
        base=['#d3ba74','#cdb46e','#d8c07c'][Math.floor(v*3)];
        spek1='rgba(120,95,45,0.35)'; spek2='rgba(255,240,190,0.4)';
      }
      else if(pathSet.has(key)){
        base=env.path[Math.floor(v*env.path.length)];
        spek1='rgba(70,52,28,0.4)'; spek2='rgba(200,175,120,0.4)';
      }
      else{
        const g=hillSet.has(key)?env.hill:env.grass;
        base=g[Math.floor(v*g.length)];
        spek1='rgba(30,55,12,0.35)'; spek2='rgba(160,180,100,0.3)';
      }
      drawDiamond(tx2,x,y,raise,base,null);
      tx2.save(); diamondPath(tx2,sx,sy); tx2.clip();
      for(let i=0;i<10;i++){
        const dx=(rnd2(x,y,i+2)-0.5)*TW*0.85, dy=(rnd2(x,y,i+9)-0.5)*TH*0.85;
        tx2.fillStyle=i%2?spek1:spek2;
        tx2.fillRect(sx+dx,sy+TH/2+dy,1.8,1.3);
      }
      if(ter==='beach'&&x===2){
        tx2.fillStyle='rgba(120,100,60,0.3)';
        tx2.beginPath(); tx2.moveTo(sx-TW/2,sy+TH/2); tx2.lineTo(sx-TW/6,sy+TH*0.17); tx2.lineTo(sx-TW/6,sy+TH*0.83); tx2.closePath(); tx2.fill();
      }
      if(SEA&&ter==='grass'&&x===4){
        tx2.fillStyle='rgba(205,180,110,0.55)';
        for(let i=0;i<6;i++){
          const dx=-TW*0.22-rnd2(x,y,i+70)*TW*0.18, dy=(rnd2(x,y,i+80)-0.5)*TH*0.6;
          tx2.fillRect(sx+dx,sy+TH/2+dy,2,1.4);
        }
      }
      if(env.snow&&ter==='grass'&&!pathSet.has(key)&&rnd2(x,y,25)>0.72){
        tx2.fillStyle='rgba(240,244,246,0.75)';
        tx2.beginPath(); tx2.ellipse(sx+(rnd2(x,y,26)-0.5)*10,sy+TH/2+(rnd2(x,y,27)-0.5)*6,7,3.4,0,0,7); tx2.fill();
      }
      if(env.tufts&&ter==='grass'&&!pathSet.has(key)&&rnd2(x,y,20)>0.5){
        tx2.strokeStyle='rgba(35,60,15,0.5)'; tx2.lineWidth=1;
        const gx=sx+(rnd2(x,y,21)-0.5)*TW*0.5, gy=sy+TH/2+(rnd2(x,y,22)-0.5)*TH*0.5;
        tx2.beginPath(); tx2.moveTo(gx,gy); tx2.lineTo(gx-2,gy-4);
        tx2.moveTo(gx,gy); tx2.lineTo(gx,gy-5); tx2.moveTo(gx,gy); tx2.lineTo(gx+2,gy-4); tx2.stroke();
      }
      tx2.restore();
      if(pathSet.has(key)){
        drawDiamond(tx2,x,y,raise,null,'rgba(60,45,22,0.35)');
      }
      if(raise){
        const isEdgeS=!hillSet.has(x+','+(y+1)), isEdgeE=!hillSet.has((x+1)+','+y);
        if(isEdgeS){
          tx2.fillStyle='rgba(0,0,0,0.22)';
          tx2.beginPath();
          tx2.moveTo(sx-TW/2,sy+TH/2); tx2.lineTo(sx,sy+TH); tx2.lineTo(sx,sy+TH+raise); tx2.lineTo(sx-TW/2,sy+TH/2+raise);
          tx2.closePath(); tx2.fill();
        }
        if(isEdgeE){
          tx2.fillStyle='rgba(0,0,0,0.32)';
          tx2.beginPath();
          tx2.moveTo(sx+TW/2,sy+TH/2); tx2.lineTo(sx,sy+TH); tx2.lineTo(sx,sy+TH+raise); tx2.lineTo(sx+TW/2,sy+TH/2+raise);
          tx2.closePath(); tx2.fill();
        }
      }
    }
  }
  // vyjeté koleje podél cest
  for(const k of PATH_KEYS){
    const p=PATHS[k];
    tx2.strokeStyle='rgba(70,52,28,0.4)'; tx2.lineWidth=1.1;
    for(let i=1;i<p.length;i++){
      const [ax,ay]=p[i-1],[bx,by]=p[i];
      const x1=isoX(ax,ay), y1=isoY(ax,ay)+TH/2-raiseAt(ax,ay);
      const x2=isoX(bx,by), y2=isoY(bx,by)+TH/2-raiseAt(bx,by);
      const dx=x2-x1, dy=y2-y1, L=Math.hypot(dx,dy)||1;
      const ox=-dy/L*2.6, oy=dx/L*2.6;
      tx2.beginPath(); tx2.moveTo(x1+ox,y1+oy); tx2.lineTo(x2+ox,y2+oy);
      tx2.moveTo(x1-ox,y1-oy); tx2.lineTo(x2-ox,y2-oy); tx2.stroke();
    }
  }
  // políčka
  for(const [x,y] of FIELDS){
    const sx=isoX(x,y), sy=isoY(x,y);
    diamondPath(tx2,sx,sy); tx2.fillStyle='#a8894a'; tx2.fill();
    tx2.save(); diamondPath(tx2,sx,sy); tx2.clip();
    tx2.strokeStyle='rgba(96,66,28,0.55)'; tx2.lineWidth=1;
    for(let i=-3;i<=3;i++){
      tx2.beginPath(); tx2.moveTo(sx-TW/2+3,sy+TH/2+i*2.6); tx2.lineTo(sx+TW/2-3,sy+TH/2+i*2.6); tx2.stroke();
    }
    tx2.strokeStyle='rgba(222,192,106,0.85)';
    for(let i=0;i<12;i++){
      const fx=sx+(rnd2(x,y,90+i)-0.5)*TW*0.62, fy=sy+TH/2+(rnd2(x,y,100+i)-0.5)*TH*0.62;
      tx2.beginPath(); tx2.moveTo(fx,fy); tx2.lineTo(fx,fy-3.4); tx2.stroke();
    }
    tx2.restore();
    diamondPath(tx2,sx,sy); tx2.strokeStyle='rgba(90,67,38,0.6)'; tx2.lineWidth=1; tx2.stroke();
  }
  // ploty u stavení (jen kde se hodí)
  if(env.house==='cottage'||env.house==='hut'){
    for(const [x,y] of DECOR){
      const sx=isoX(x,y), sy=isoY(x,y)+TH/2-raiseAt(x,y);
      tx2.strokeStyle='#6a4f2e'; tx2.lineWidth=1.3;
      for(let i=0;i<4;i++){
        const fx=sx-14+i*9, fy=sy+8-(i%2);
        tx2.beginPath(); tx2.moveTo(fx,fy); tx2.lineTo(fx,fy-5); tx2.stroke();
      }
      tx2.beginPath(); tx2.moveTo(sx-14,sy+5); tx2.lineTo(sx+13,sy+5); tx2.stroke();
    }
  }
  // kameny s mechem
  for(const [x,y] of ROCKS){
    const sx=isoX(x,y)+(rnd2(x,y,30)-0.5)*10, sy=isoY(x,y)+TH/2;
    tx2.fillStyle='rgba(0,0,0,0.2)'; tx2.beginPath(); tx2.ellipse(sx+1,sy+1,6,2.4,0,0,7); tx2.fill();
    tx2.fillStyle='#8a877a'; tx2.beginPath(); tx2.ellipse(sx,sy-1.5,5,3.2,0,0,7); tx2.fill();
    tx2.fillStyle='#a3a091'; tx2.beginPath(); tx2.ellipse(sx-1.5,sy-2.8,2.8,1.8,0,0,7); tx2.fill();
    tx2.fillStyle='#75726a'; tx2.beginPath(); tx2.ellipse(sx+3.4,sy-0.6,2.2,1.5,0,0,7); tx2.fill();
    if(!env.snow){ tx2.fillStyle='rgba(90,130,50,0.55)'; tx2.fillRect(sx-3,sy-3.4,2,1.4); tx2.fillRect(sx+1,sy-4,1.6,1.2); }
    else { tx2.fillStyle='rgba(240,244,246,0.8)'; tx2.fillRect(sx-3,sy-4,4,1.6); }
  }
  // keře
  for(const [x,y] of BUSHES){
    const sx=isoX(x,y)+(rnd2(x,y,31)-0.5)*8, sy=isoY(x,y)+TH/2-raiseAt(x,y);
    tx2.fillStyle='rgba(0,0,0,0.18)'; tx2.beginPath(); tx2.ellipse(sx+1,sy,6,2.2,0,0,7); tx2.fill();
    tx2.fillStyle=env.bush; tx2.beginPath(); tx2.arc(sx-3,sy-3,4,0,7); tx2.arc(sx+3,sy-3,3.6,0,7); tx2.fill();
    tx2.fillStyle='rgba(255,255,255,0.12)'; tx2.beginPath(); tx2.arc(sx-1,sy-5.5,2,0,7); tx2.fill();
  }
  // květiny
  for(const [x,y] of FLOWERS){
    for(let i=0;i<4;i++){
      const fx=isoX(x,y)+(rnd2(x,y,40+i)-0.5)*TW*0.5, fy=isoY(x,y)+TH/2+(rnd2(x,y,50+i)-0.5)*TH*0.5;
      tx2.fillStyle=['#e8e2ce','#e8d24a','#c05040','#b57edc'][Math.floor(rnd2(x,y,60+i)*4)];
      tx2.fillRect(fx,fy,1.8,1.8);
    }
  }
  // číselné popisky výchozích bodů
  for(const k of PATH_KEYS){
    const owner=PATH_OWNER[k]||1;
    const num=(owner===2?PATH_KEYS2:PATH_KEYS1).indexOf(k)+1;
    const [x,y]=PATHS[k][0];
    const sx=isoX(x,y), sy=isoY(x,y)-6;
    tx2.fillStyle='rgba(20,22,14,0.75)';
    tx2.beginPath(); tx2.arc(sx,sy,7.5,0,7); tx2.fill();
    tx2.strokeStyle=owner===2?'#7ab0ff':'#d4b45a'; tx2.lineWidth=1.2; tx2.stroke();
    tx2.fillStyle='#e8e2ce'; tx2.font='bold 10px Georgia'; tx2.textAlign='center';
    tx2.fillText(String(num),sx,sy+3.5);
  }
}

/* --- Dynamické prvky --- */
function shadow(sx,sy,rx,ry){
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(sx,sy,rx,ry,0,0,7); ctx.fill();
}
function drawWaves(){
  if(!SEA) return;
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
  for(let y=0;y<ROWS;y+=2){
    const ph=animT*1.2+y;
    const sx=isoX(1.5,y)+Math.sin(ph)*3, sy=isoY(1.5,y)+TH/2;
    ctx.beginPath(); ctx.moveTo(sx-7,sy); ctx.quadraticCurveTo(sx,sy-2.5,sx+7,sy); ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,255,255,0.45)';
  for(let y=0;y<ROWS;y++){
    const off=Math.sin(animT*2+y*1.7)*2;
    const sx=isoX(2,y)+off, sy=isoY(2,y)+TH/2;
    ctx.beginPath(); ctx.moveTo(sx-9,sy+2); ctx.quadraticCurveTo(sx-2,sy-1,sx+6,sy+1); ctx.stroke();
  }
  for(let i=0;i<12;i++){
    const wx=rnd2(i,9,2)*1.6, wy=rnd2(i,3,5)*(ROWS-1);
    const tw=Math.abs(Math.sin(animT*2.5+i*1.9));
    ctx.fillStyle='rgba(255,255,255,'+(0.3*tw).toFixed(2)+')';
    ctx.fillRect(isoX(wx,wy),isoY(wx,wy)+TH/2,1.6,1.6);
  }
}
function drawClouds(){
  ctx.fillStyle='rgba(15,25,10,0.08)';
  for(let i=0;i<3;i++){
    const cx1=((animT*7+i*430)%(VIEW_W+320))-160;
    const cy1=110+i*170+Math.sin(animT*0.2+i)*20;
    ctx.beginPath(); ctx.ellipse(cx1,cy1,95,38,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx1+55,cy1+14,62,26,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx1-50,cy1+10,50,22,0,0,7); ctx.fill();
  }
}
function drawGulls(){
  if(!SEA) return;
  ctx.strokeStyle='rgba(240,240,235,0.85)'; ctx.lineWidth=1.2;
  for(let i=0;i<3;i++){
    const a=animT*0.35+i*2.2;
    const cx0=isoX(0.6,4+i*7), cy0=isoY(0.6,4+i*7)-30;
    const gx=cx0+Math.cos(a)*30, gy=cy0+Math.sin(a*1.4)*12;
    const w=Math.sin(animT*7+i*2)*2.5;
    ctx.beginPath();
    ctx.moveTo(gx-4,gy); ctx.quadraticCurveTo(gx-2,gy-2.5-w,gx,gy);
    ctx.quadraticCurveTo(gx+2,gy-2.5-w,gx+4,gy);
    ctx.stroke();
  }
}
function drawBoat(x,y){
  const bob=Math.sin(animT*1.5+y)*1.5;
  const sx=isoX(x,y), sy=isoY(x,y)+TH/2+bob;
  shadow(sx,sy+3,16,4);
  ctx.fillStyle='#5a3d22';
  ctx.beginPath(); ctx.moveTo(sx-18,sy-2); ctx.quadraticCurveTo(sx,sy+8,sx+18,sy-2);
  ctx.lineTo(sx+13,sy-6); ctx.lineTo(sx-13,sy-6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#7a5a34'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx-15,sy-4); ctx.quadraticCurveTo(sx,sy+3,sx+15,sy-4); ctx.stroke();
  ctx.strokeStyle='#5a3d22'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(sx+16,sy-4); ctx.quadraticCurveTo(sx+22,sy-10,sx+19,sy-14); ctx.stroke();
  for(let i=-1;i<=1;i++){
    ctx.fillStyle=i%2?'#a83a2a':'#d4b45a';
    ctx.beginPath(); ctx.arc(sx+i*9,sy-5,3.4,0,7); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
  }
  ctx.strokeStyle='#4a3018'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(sx,sy-6); ctx.lineTo(sx,sy-26); ctx.stroke();
  for(let i=0;i<5;i++){
    ctx.fillStyle=i%2?'#b8b0a0':'#a83a2a';
    ctx.fillRect(sx-9,sy-25+i*3.2,18,3.2);
  }
}
function drawTent(x,y,col){
  const sx=isoX(x,y), sy=isoY(x,y)+TH/2;
  shadow(sx+2,sy+1,13,4);
  ctx.fillStyle='#ddd5be';
  ctx.beginPath(); ctx.moveTo(sx-13,sy); ctx.lineTo(sx,sy-17); ctx.lineTo(sx+13,sy); ctx.closePath(); ctx.fill();
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(sx-13,sy); ctx.lineTo(sx,sy-17); ctx.lineTo(sx-4,sy); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#3d3427';
  ctx.beginPath(); ctx.moveTo(sx+2,sy); ctx.lineTo(sx+6,sy-7); ctx.lineTo(sx+10,sy); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#5a4326'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(sx,sy-17); ctx.lineTo(sx,sy-25); ctx.stroke();
  const fl=Math.sin(animT*3+y)*1.6;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(sx,sy-25); ctx.lineTo(sx+8,sy-23+fl); ctx.lineTo(sx,sy-20); ctx.closePath(); ctx.fill();
}
function drawFort(x,y,col){
  const sx=isoX(x,y), sy=isoY(x,y)+TH/2;
  shadow(sx+2,sy+1,15,4);
  // palisáda ze zašpičatělých kůlů
  ctx.fillStyle='#8a6a3e';
  for(let i=0;i<6;i++){
    const px=sx-14+i*5.5;
    ctx.fillRect(px,sy-14,4,14);
    ctx.beginPath(); ctx.moveTo(px,sy-14); ctx.lineTo(px+2,sy-18); ctx.lineTo(px+4,sy-14); ctx.closePath(); ctx.fill();
  }
  ctx.strokeStyle='#5a4326'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(sx-14,sy-8); ctx.lineTo(sx+16,sy-8); ctx.stroke();
  drawTentSmall(sx+6,sy-14,col);
}
function drawTentSmall(sx,sy,col){
  ctx.fillStyle='#ddd5be';
  ctx.beginPath(); ctx.moveTo(sx-7,sy); ctx.lineTo(sx,sy-9); ctx.lineTo(sx+7,sy); ctx.closePath(); ctx.fill();
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(sx-7,sy); ctx.lineTo(sx,sy-9); ctx.lineTo(sx-2,sy); ctx.closePath(); ctx.fill();
}
function drawYurt(x,y,flag){
  const sx=isoX(x,y), sy=isoY(x,y)+TH/2-raiseAt(x,y);
  shadow(sx+2,sy+1,12,4);
  ctx.fillStyle='#e3dcc8';
  ctx.beginPath(); ctx.ellipse(sx,sy-1,11,4.5,0,0,7); ctx.fill();
  ctx.fillRect(sx-11,sy-10,22,9);
  ctx.beginPath(); ctx.ellipse(sx,sy-10,11,4.5,0,0,7); ctx.fill();
  ctx.fillStyle='#cfc5aa';
  ctx.beginPath(); ctx.moveTo(sx-11,sy-10); ctx.quadraticCurveTo(sx,sy-20,sx+11,sy-10); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#a89468'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx-11,sy-6); ctx.lineTo(sx+11,sy-6); ctx.stroke();
  ctx.fillStyle='#8a3e2a';
  ctx.beginPath(); ctx.moveTo(sx-3,sy-1); ctx.lineTo(sx-3,sy-9); ctx.lineTo(sx+3,sy-9); ctx.lineTo(sx+3,sy-1); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#6a5636'; ctx.beginPath(); ctx.ellipse(sx,sy-16,3,1.4,0,0,7); ctx.fill();
  if(flag){
    ctx.strokeStyle='#5a4326'; ctx.lineWidth=1.3;
    ctx.beginPath(); ctx.moveTo(sx+11,sy-10); ctx.lineTo(sx+11,sy-22); ctx.stroke();
    ctx.fillStyle='#8a3e2a';
    ctx.beginPath(); ctx.moveTo(sx+11,sy-22); ctx.lineTo(sx+18,sy-20+Math.sin(animT*3)*1.5); ctx.lineTo(sx+11,sy-17); ctx.closePath(); ctx.fill();
  }
}
function drawCamp(x,y,civKey){
  const camp=CIVS[civKey].camp, col=CIVS[civKey].col1;
  if(camp==='boat') drawBoat(x,y);
  else if(camp==='tent') drawTent(x,y,col);
  else if(camp==='fort') drawFort(x,y,col);
  else drawYurt(x,y,true);
}
function drawTree(x,y){
  const env=CIVS[S.defCiv].env;
  const sx=isoX(x,y), sy=isoY(x,y)+TH/2-raiseAt(x,y);
  const v=rnd2(x,y,70), sc=0.8+rnd2(x,y,71)*0.5;
  shadow(sx+3*sc,sy,10*sc,3.5*sc);
  const kind=env.tree==='mixed'?(v>0.42?'oak':'pine'):env.tree;
  if(kind==='palm'){
    ctx.strokeStyle='#8a6a3e'; ctx.lineWidth=2.6*sc;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(sx+4*sc,sy-12*sc,sx+7*sc,sy-22*sc); ctx.stroke();
    const tx=sx+7*sc, ty=sy-22*sc;
    ctx.strokeStyle='#3d7320'; ctx.lineWidth=2*sc;
    for(let i=0;i<5;i++){
      const a=-0.5+i*0.55;
      ctx.beginPath(); ctx.moveTo(tx,ty);
      ctx.quadraticCurveTo(tx+Math.cos(a)*10*sc,ty+Math.sin(a)*4*sc-4*sc,tx+Math.cos(a)*15*sc,ty+Math.sin(a)*8*sc);
      ctx.stroke();
    }
    ctx.fillStyle='#6a4a2a';
    ctx.beginPath(); ctx.arc(tx-1,ty+2,1.6*sc,0,7); ctx.arc(tx+2,ty+2.5,1.6*sc,0,7); ctx.fill();
  } else if(kind==='steppe'){
    ctx.strokeStyle='#6a5636'; ctx.lineWidth=1.6*sc;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx-1*sc,sy-9*sc); ctx.stroke();
    ctx.fillStyle='#7a7a42';
    ctx.beginPath(); ctx.ellipse(sx-1*sc,sy-12*sc,7*sc,4*sc,0,0,7); ctx.fill();
    ctx.fillStyle='#8f8f50';
    ctx.beginPath(); ctx.ellipse(sx-2*sc,sy-13.5*sc,4*sc,2.4*sc,0,0,7); ctx.fill();
  } else if(kind==='jungle'){
    ctx.fillStyle='#4a3520'; ctx.fillRect(sx-2*sc,sy-11*sc,4*sc,11*sc);
    ctx.strokeStyle='#3d6a28'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx-1,sy-16*sc); ctx.quadraticCurveTo(sx-6*sc,sy-10*sc,sx-5*sc,sy-3*sc); ctx.stroke(); // liána
    ctx.fillStyle='#1d3d10';
    ctx.beginPath(); ctx.arc(sx-7*sc,sy-15*sc,8.5*sc,0,7); ctx.arc(sx+7*sc,sy-15*sc,8.5*sc,0,7); ctx.arc(sx,sy-24*sc,10*sc,0,7); ctx.fill();
    ctx.fillStyle='#2a5518';
    ctx.beginPath(); ctx.arc(sx-4*sc,sy-18*sc,7*sc,0,7); ctx.arc(sx+6*sc,sy-16*sc,6.5*sc,0,7); ctx.arc(sx-1*sc,sy-25*sc,7.5*sc,0,7); ctx.fill();
    ctx.fillStyle='#3d7320';
    ctx.beginPath(); ctx.arc(sx-2*sc,sy-21*sc,5*sc,0,7); ctx.arc(sx+3*sc,sy-26*sc,4.4*sc,0,7); ctx.fill();
  } else if(kind==='sakura'){
    ctx.fillStyle='#4a3520'; ctx.fillRect(sx-2*sc,sy-10*sc,4*sc,10*sc);
    ctx.fillStyle='#b8688a';
    ctx.beginPath(); ctx.arc(sx-6*sc,sy-14*sc,7.5*sc,0,7); ctx.arc(sx+6*sc,sy-14*sc,7.5*sc,0,7); ctx.arc(sx,sy-21*sc,8.5*sc,0,7); ctx.fill();
    ctx.fillStyle='#d88aa8';
    ctx.beginPath(); ctx.arc(sx-4*sc,sy-16*sc,6*sc,0,7); ctx.arc(sx+5*sc,sy-15*sc,5.5*sc,0,7); ctx.arc(sx-sc,sy-22*sc,6.5*sc,0,7); ctx.fill();
    ctx.fillStyle='#f0b8cc';
    ctx.beginPath(); ctx.arc(sx-3*sc,sy-19*sc,4*sc,0,7); ctx.arc(sx+2*sc,sy-23*sc,3.6*sc,0,7); ctx.fill();
  } else if(kind==='cypress'){
    ctx.fillStyle='#4a3520'; ctx.fillRect(sx-1.4*sc,sy-6*sc,2.8*sc,6*sc);
    ctx.fillStyle='#2a4a22';
    ctx.beginPath(); ctx.ellipse(sx,sy-19*sc,4.5*sc,14*sc,0,0,7); ctx.fill();
    ctx.fillStyle='#365c2c';
    ctx.beginPath(); ctx.ellipse(sx-1*sc,sy-21*sc,3*sc,11*sc,0,0,7); ctx.fill();
  } else if(kind==='pine'){
    ctx.fillStyle='#5a4326'; ctx.fillRect(sx-1.6*sc,sy-9*sc,3.2*sc,9*sc);
    const greens=['#2a4f16','#33611b','#3d7320'];
    for(let i=0;i<3;i++){
      const base=sy-(7+i*6)*sc, w=(13-i*3.2)*sc, h=10*sc;
      ctx.fillStyle=greens[i];
      ctx.beginPath(); ctx.moveTo(sx,base-h); ctx.lineTo(sx+w,base); ctx.lineTo(sx-w,base); ctx.closePath(); ctx.fill();
    }
    if(CIVS[S.defCiv].env.snow){
      ctx.strokeStyle='rgba(240,244,246,0.85)'; ctx.lineWidth=1.6*sc;
      for(let i=0;i<3;i++){
        const base=sy-(7+i*6)*sc, w=(11-i*3)*sc;
        ctx.beginPath(); ctx.moveTo(sx-w,base-0.5); ctx.lineTo(sx,base-10*sc+2); ctx.stroke();
      }
    }
  } else { // dub
    ctx.fillStyle='#5a4326'; ctx.fillRect(sx-2*sc,sy-10*sc,4*sc,10*sc);
    ctx.fillStyle='#4a3520'; ctx.fillRect(sx,sy-10*sc,2*sc,10*sc);
    ctx.fillStyle='#274a14';
    ctx.beginPath(); ctx.arc(sx-6*sc,sy-14*sc,8*sc,0,7); ctx.arc(sx+6*sc,sy-14*sc,8*sc,0,7); ctx.arc(sx,sy-22*sc,9*sc,0,7); ctx.fill();
    ctx.fillStyle='#356118';
    ctx.beginPath(); ctx.arc(sx-4*sc,sy-16*sc,6.5*sc,0,7); ctx.arc(sx+5*sc,sy-15*sc,6*sc,0,7); ctx.arc(sx-sc,sy-23*sc,7*sc,0,7); ctx.fill();
    ctx.fillStyle='#46791f';
    ctx.beginPath(); ctx.arc(sx-3*sc,sy-19*sc,4.5*sc,0,7); ctx.arc(sx+2*sc,sy-24*sc,4*sc,0,7); ctx.fill();
  }
}
function drawMountain(x,y){
  const type=CIVS[S.defCiv].env.mounts.type;
  const sx=isoX(x,y), sy=isoY(x,y)+TH/2-raiseAt(x,y);
  const v=rnd2(x,y,77), sc=0.85+v*0.4;
  shadow(sx+5*sc,sy+1,16*sc,5*sc);
  if(type==='alpine'){
    // vysoké severské štíty se sněhem (Norsko — 2/3 země hornaté)
    const peaks=[[-8,34],[6,42],[14,26]];
    for(const [ox,hh] of peaks){
      const px=sx+ox*sc, h=hh*sc, w=13*sc;
      ctx.fillStyle='#6e6a60';
      ctx.beginPath(); ctx.moveTo(px,sy-h); ctx.lineTo(px+w,sy); ctx.lineTo(px-w,sy); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#57544c';
      ctx.beginPath(); ctx.moveTo(px,sy-h); ctx.lineTo(px+w,sy); ctx.lineTo(px,sy); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#eef2f4';
      ctx.beginPath(); ctx.moveTo(px,sy-h); ctx.lineTo(px+w*0.34,sy-h*0.62); ctx.lineTo(px+w*0.1,sy-h*0.55);
      ctx.lineTo(px-w*0.12,sy-h*0.64); ctx.lineTo(px-w*0.32,sy-h*0.6); ctx.closePath(); ctx.fill();
    }
  } else if(type==='mesa'){
    // stolová hora / skalní plošina arabské pouště
    const w=16*sc, h=22*sc, top=9*sc;
    ctx.fillStyle='#c49a62';
    ctx.beginPath(); ctx.moveTo(sx-top,sy-h); ctx.lineTo(sx+top,sy-h); ctx.lineTo(sx+w,sy); ctx.lineTo(sx-w,sy); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#a87f4c';
    ctx.beginPath(); ctx.moveTo(sx+top,sy-h); ctx.lineTo(sx+w,sy); ctx.lineTo(sx,sy); ctx.lineTo(sx,sy-h); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#d3ab72';
    ctx.beginPath(); ctx.ellipse(sx,sy-h,top,top*0.34,0,0,7); ctx.fill();
    ctx.strokeStyle='rgba(120,80,40,0.55)'; ctx.lineWidth=1;

      const yy=sy-h+i*(h/4), ww=top+(w-top)*(i/4);
      ctx.beginPath(); ctx.moveTo(sx-ww,yy); ctx.lineTo(sx+ww,yy); ctx.stroke();
    }
  } else if(type==='steppe'){
    // altajské hřbety nad stepí
    const peaks=[[-7,26],[7,32]];
    for(const [ox,hh] of peaks){
      const px=sx+ox*sc, h=hh*sc, w=14*sc;
      ctx.fillStyle='#8a7a5e';
      ctx.beginPath(); ctx.moveTo(px,sy-h); ctx.lineTo(px+w,sy); ctx.lineTo(px-w,sy); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#6e6049';
      ctx.beginPath(); ctx.moveTo(px,sy-h); ctx.lineTo(px+w,sy); ctx.lineTo(px,sy); ctx.closePath(); ctx.fill();
      if(hh>28){ ctx.fillStyle='#eef2f4';
        ctx.beginPath(); ctx.moveTo(px,sy-h); ctx.lineTo(px+w*0.22,sy-h*0.72); ctx.lineTo(px-w*0.2,sy-h*0.7); ctx.closePath(); ctx.fill(); }
    }
  } else {
    // anglické oblé pahorky (downs)
    ctx.fillStyle='#6d9245';
    ctx.beginPath(); ctx.ellipse(sx,sy-4*sc,17*sc,10*sc,0,Math.PI,0); ctx.fill();
    ctx.fillStyle='#7da051';
    ctx.beginPath(); ctx.ellipse(sx-3*sc,sy-6*sc,10*sc,6*sc,0,Math.PI,0); ctx.fill();
    ctx.fillStyle='#8a877a';
    ctx.beginPath(); ctx.ellipse(sx+7*sc,sy-3*sc,2.4,1.6,0,0,7); ctx.fill();
    ctx.fillStyle='rgba(35,60,15,0.4)';
    for(let i=0;i<4;i++) ctx.fillRect(sx-10+i*6,sy-5-(i%2)*3,1.6,3);
  }
}

function stoneBody(sx,syTop,w,h,cA,cB){
  ctx.fillStyle=cA; ctx.fillRect(sx-w/2,syTop,w/2,h);
  ctx.fillStyle=cB; ctx.fillRect(sx,syTop,w/2,h);
  ctx.strokeStyle='rgba(50,46,38,0.4)'; ctx.lineWidth=0.8;
  for(let i=1;i<h/5;i++){
    ctx.beginPath(); ctx.moveTo(sx-w/2+1,syTop+i*5); ctx.lineTo(sx+w/2-1,syTop+i*5); ctx.stroke();
  }
  for(let i=0;i<h/5;i++){
    const off=(i%2)?w/4:0;
    ctx.beginPath(); ctx.moveTo(sx-w/4+off,syTop+i*5); ctx.lineTo(sx-w/4+off,syTop+i*5+5); ctx.stroke();
  }
}
function crenels(sx,syTop,w,cA){

  ctx.beginPath(); ctx.moveTo(sx-17,sy-28); ctx.lineTo(sx,sy-41); ctx.lineTo(sx,sy-28); ctx.closePath(); ctx.fill();
  ctx.fillStyle=roof;
  ctx.beginPath(); ctx.moveTo(sx-17,sy-28); ctx.lineTo(sx,sy-41); ctx.lineTo(sx+17,sy-28); ctx.closePath();
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.8;
  for(let i=1;i<4;i++){
    ctx.beginPath(); ctx.moveTo(sx-17+i*4,sy-28-i*3+2); ctx.lineTo(sx+17-i*4,sy-28-i*3+2); ctx.stroke();
  }
  ctx.strokeStyle='#d4b45a'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(sx,sy-46); ctx.lineTo(sx,sy-58); ctx.stroke();
  const fl=Math.sin(animT*3)*2;
  ctx.fillStyle=CIVS[S.defCiv].col1;
  ctx.beginPath(); ctx.moveTo(sx,sy-58); ctx.quadraticCurveTo(sx+6,sy-57+fl,sx+11,sy-55+fl); ctx.lineTo(sx+9,sy-52+fl*0.5); ctx.quadraticCurveTo(sx+5,sy-53,sx,sy-51); ctx.closePath(); ctx.fill();
  if(S.battle){
    const w=44, f=Math.max(0,S.battle.tcHp/TC_HP);
    if(f<0.7) smokePuffs(sx-6,sy-40,0.8);
    if(f<0.4){ flames(sx-9,sy-28,0.8); flames(sx+9,sy-27,0.7); smokePuffs(sx+4,sy-44,1); }
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(sx-w/2-1,sy-66,w+2,6);
    ctx.fillStyle=f>0.4?'#6a9a4a':'#c05040'; ctx.fillRect(sx-w/2,sy-65,w*f,4);
  }
}
function drawUnit(u){
  const owner=u.owner||1, civKey=civOf(owner);
  const d=UF(owner)[u.type], raise=raiseAt(Math.round(u.x),Math.round(u.y));
  const civ=CIVS[civKey];
  const bob=u.atk?0:Math.abs(Math.sin(animT*9+u.ph))*1.6;
  const sx=isoX(u.x,u.y), sy=isoY(u.x,u.y)+TH/2-raise-bob;
  shadow(sx,sy+bob,u.type==='siege'?12:(civKey==='persia'&&u.type==='elite'?11:6),u.type==='siege'?4:(civKey==='persia'&&u.type==='elite'?4:2.4));
  if(civKey==='persia'&&u.type==='elite'){
    // válečný slon
    ctx.fillStyle='#84848e';
    ctx.beginPath(); ctx.ellipse(sx-1,sy-7,9,5.5,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+8,sy-9,4,0,7); ctx.fill();
    ctx.strokeStyle='#84848e'; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.moveTo(sx+11,sy-8); ctx.quadraticCurveTo(sx+14,sy-4,sx+12.6,sy-1); ctx.stroke();
    ctx.strokeStyle='#e8e2ce'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(sx+10,sy-6); ctx.lineTo(sx+13.4,sy-4.4); ctx.stroke();
    ctx.fillStyle='#6e6e78'; ctx.beginPath(); ctx.arc(sx+6,sy-11,2.6,0,7); ctx.fill();
    ctx.strokeStyle='#5a5a64'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(sx-6,sy-3); ctx.lineTo(sx-6,sy+1); ctx.moveTo(sx-2,sy-3); ctx.lineTo(sx-2,sy+1);
    ctx.moveTo(sx+2,sy-3); ctx.lineTo(sx+2,sy+1); ctx.moveTo(sx+6,sy-3); ctx.lineTo(sx+6,sy+1);
    ctx.stroke();
    ctx.fillStyle=civ.col1; ctx.fillRect(sx-6,sy-13,10,4.5);
    ctx.fillStyle='#d8a878'; ctx.beginPath(); ctx.arc(sx-1,sy-15,2.2,0,7); ctx.fill();
    const w=16, f=Math.max(0,u.hp/u.max);
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(sx-w/2-1,sy-24,w+2,4);
    ctx.fillStyle=f>0.4?'#6a9a4a':'#c05040'; ctx.fillRect(sx-w/2,sy-23,w*f,2.6);
    return;
  }
  if(u.type==='siege'){
    ctx.fillStyle='#4a3a20';
    ctx.beginPath(); ctx.arc(sx-8,sy-1,3,0,7); ctx.arc(sx,sy-1,3,0,7); ctx.arc(sx+8,sy-1,3,0,7); ctx.fill();
    ctx.fillStyle='#7a5f3a';
    ctx.beginPath(); ctx.moveTo(sx-13,sy-4); ctx.lineTo(sx,sy-13); ctx.lineTo(sx+13,sy-4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#8e6f45';
    ctx.beginPath(); ctx.moveTo(sx-13,sy-4); ctx.lineTo(sx,sy-13); ctx.lineTo(sx,sy-4); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(sx-13,sy-4); ctx.lineTo(sx+13,sy-4); ctx.stroke();
    ctx.strokeStyle='#5a4326'; ctx.lineWidth=2.6;
    ctx.beginPath(); ctx.moveTo(sx+11,sy-6); ctx.lineTo(sx+17,sy-7); ctx.stroke();
  } else {
    const big=(u.type==='elite'||u.type==='leader');
    ctx.strokeStyle='#3a2a1a'; ctx.lineWidth=1.6;
    const leg=u.atk?0:Math.sin(animT*9+u.ph)*2;
    ctx.beginPath(); ctx.moveTo(sx-1,sy-5); ctx.lineTo(sx-2-leg,sy);
    ctx.moveTo(sx+1,sy-5); ctx.lineTo(sx+2+leg,sy); ctx.stroke();
    const tunic=u.type==='leader'?'#b8952e':(u.type==='ranged'?civ.col2:civ.col1);
    ctx.fillStyle=tunic;
    ctx.beginPath(); ctx.moveTo(sx-3.4,sy-4); ctx.lineTo(sx-2.6,sy-11); ctx.lineTo(sx+2.6,sy-11); ctx.lineTo(sx+3.4,sy-4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#d8a878'; ctx.beginPath(); ctx.arc(sx,sy-13,big?3.2:2.7,0,7); ctx.fill();
    // pokrývka hlavy dle národa
    if(civKey==='sarac'){
      ctx.fillStyle='#e8e2ce'; ctx.beginPath(); ctx.arc(sx,sy-14,big?3.2:2.7,Math.PI,0); ctx.fill();
      ctx.fillRect(sx-(big?3.2:2.7),sy-14.5,(big?6.4:5.4),1.6);
    } else if(civKey==='mongol'){
      ctx.fillStyle='#5a4326';
      ctx.beginPath(); ctx.moveTo(sx-(big?3.4:2.9),sy-14); ctx.lineTo(sx,sy-19); ctx.lineTo(sx+(big?3.4:2.9),sy-14); ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle='#8a8a8a';
      ctx.beginPath(); ctx.arc(sx,sy-14,big?3.2:2.7,Math.PI,0); ctx.fill();
    }
    if(civKey==='viking'&&u.type==='elite'){
      ctx.strokeStyle='#e8e2ce'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(sx-3,sy-15); ctx.quadraticCurveTo(sx-6,sy-17,sx-5,sy-19);
      ctx.moveTo(sx+3,sy-15); ctx.quadraticCurveTo(sx+6,sy-17,sx+5,sy-19); ctx.stroke();
    }
    if(u.type==='leader'){ ctx.fillStyle='#d4b45a'; ctx.fillRect(sx-3.4,sy-17.5,6.8,2.4); }
    if(u.type==='ranged'){
      ctx.strokeStyle='#e8e2ce'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(sx+5,sy-10,4,-1.15,1.15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+3.8,sy-13.5); ctx.lineTo(sx+3.8,sy-6.5); ctx.stroke();
    } else if(u.type==='basic'||u.type==='elite'){
      const sw=u.atk?Math.sin(animT*10+u.ph)*0.5:0;
      ctx.strokeStyle='#5a4326'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(sx+4,sy-8); ctx.lineTo(sx+7+sw*3,sy-14-sw*2); ctx.stroke();
      ctx.fillStyle='#a8a8a8';
      ctx.beginPath(); ctx.arc(sx+7+sw*3,sy-14.5-sw*2,2,0,7); ctx.fill();
      if(u.type==='elite'){
        ctx.fillStyle=civ.col2; ctx.beginPath(); ctx.arc(sx-5,sy-9,3.4,0,7); ctx.fill();
        ctx.fillStyle='#d4b45a'; ctx.beginPath(); ctx.arc(sx-5,sy-9,1.2,0,7); ctx.fill();
      }
    } else if(u.type==='leader'){
      ctx.strokeStyle='#8a8a8a'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(sx+4,sy-8); ctx.lineTo(sx+8,sy-16); ctx.stroke();
      ctx.fillStyle='#d4b45a'; ctx.beginPath(); ctx.arc(sx-5,sy-9,3.4,0,7); ctx.fill();
      ctx.fillStyle=civ.col1; ctx.beginPath(); ctx.arc(sx-5,sy-9,1.4,0,7); ctx.fill();
    }
  }
  const w=16, f=Math.max(0,u.hp/u.max);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(sx-w/2-1,sy-22,w+2,4);
  ctx.fillStyle=f>0.4?'#6a9a4a':'#c05040'; ctx.fillRect(sx-w/2,sy-21,w*f,2.6);
}
function drawRange(x,y,rng,col){
  const sx=isoX(x,y), sy=isoY(x,y)+TH/2-raiseAt(x,y);
  ctx.strokeStyle=col; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.ellipse(sx,sy,rng*TW/2,rng*TH/2,0,0,7); ctx.stroke();
}
function drawAttackInfo(){
  // sloupec boxů při levém okraji, začíná pod plovoucím HUD
  const w=150, lh=12, gap=6;
  let y=64;
  const AK=keysOf(S.curAtt), AP=planOf(S.curAtt), AU=UF(S.curAtt);
  for(let i=0;i<AK.length&&i<4;i++){
    const k=AK[i], arr=AP[k]||[];
    const lines=[];
    const max=6;
    arr.slice(0,max).forEach((u,j)=>lines.push((j+1)+'. '+AU[u].name));
    if(arr.length>max) lines.push('… +'+(arr.length-max)+' dalších');
    if(!arr.length) lines.push('(prázdná)');
    const h=lines.length*lh+23;
    if(y+h>VIEW_H-8) break;
    const x=8;
    ctx.fillStyle='rgba(20,22,14,0.8)';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=S.selPath===k?'#d4b45a':'rgba(212,180,90,0.35)'; ctx.lineWidth=S.selPath===k?1.6:1;
    ctx.strokeRect(x,y,w,h);
    ctx.textAlign='left'; ctx.font='bold 11px Georgia'; ctx.fillStyle='#d4b45a';
    ctx.fillText(PATH_NAMES[k]+(S.selPath===k?'  ◄':''),x+7,y+14);
    ctx.font='11px Georgia'; ctx.fillStyle='#e8e2ce';
    lines.forEach((ln,j)=>ctx.fillText(ln,x+7,y+28+j*lh));
    y+=h+gap;
  }
}
function render(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.setTransform(SC*CAM.z,0,0,SC*CAM.z,-CAM.x*SC*CAM.z,-CAM.y*SC*CAM.z);
  ctx.drawImage(terra,0,0,terra.width,terra.height,0,0,VIEW_W,VIEW_H);
  drawWaves();
  drawGulls();
  for(const k of PATH_KEYS) drawCamp(0.9,PATHS[k][0][1],civOf(PATH_OWNER[k]||1));
  const objs=[];
  MOUNTS.forEach(([x,y])=>objs.push({z:x+y, f:()=>drawMountain(x,y)}));
  TREES.forEach(([x,y])=>objs.push({z:x+y, f:()=>drawTree(x,y)}));
  ANIMALS.forEach(([x,y])=>objs.push({z:x+y, f:()=>drawAnimal(x,y)}));
  DECOR.forEach(([x,y])=>objs.push({z:x+y, f:()=>drawHouse(x,y)}));
  if(S.phase!=='prepAttack'&&S.phase!=='prepAttack2') S.towers.forEach(t=>objs.push({z:t.x+t.y, f:()=>drawTower(t)}));
  objs.push({z:TC.x+TC.y, f:drawTC});
  if(S.battle) S.battle.units.forEach(u=>objs.push({z:u.x+u.y, f:()=>drawUnit(u)}));
  objs.sort((a,b)=>a.z-b.z).forEach(o=>o.f());
  drawClouds();
  if(S.battle){
    for(const s of S.battle.shots){
      const p=1-s.t/s.dur;
      const x1=isoX(s.x1,s.y1), y1=isoY(s.x1,s.y1)+TH/2-raiseAt(s.x1,s.y1)-s.h;
      const x2=isoX(s.x2,s.y2), y2=isoY(s.x2,s.y2)+TH/2-raiseAt(Math.round(s.x2),Math.round(s.y2))-6;
      const arc=Math.hypot(x2-x1,y2-y1)*0.25;
      const px=x1+(x2-x1)*p, py=y1+(y2-y1)*p-arc*4*p*(1-p);
      const p2=p+0.08;
      const px2=x1+(x2-x1)*p2, py2=y1+(y2-y1)*p2-arc*4*p2*(1-p2);
      if(s.kind==='siege'){
        ctx.fillStyle='#8a8a7a'; ctx.beginPath(); ctx.arc(px,py,3,0,7); ctx.fill();
        ctx.strokeStyle='rgba(120,120,110,0.4)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px2,py2); ctx.lineTo(px,py); ctx.stroke();
      } else {
        ctx.strokeStyle='#e8dcc0'; ctx.lineWidth=1.3;
        ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px2,py2); ctx.stroke();
      }
    }
    for(const b of S.battle.blasts){
      const sx=isoX(b.x,b.y), sy=isoY(b.x,b.y)+TH/2;
      ctx.fillStyle='rgba(230,140,40,'+(b.t/0.3*0.5)+')';
      ctx.beginPath(); ctx.ellipse(sx,sy,b.r*TW/2,b.r*TH/2,0,0,7); ctx.fill();
      ctx.fillStyle='rgba(90,70,50,'+(b.t/0.3*0.35)+')';
      ctx.beginPath(); ctx.ellipse(sx,sy-4,b.r*TW/3,b.r*TH/3,0,0,7); ctx.fill();
      ctx.fillStyle='rgba(60,45,25,'+(b.t/0.3*0.8)+')';
      for(let i=0;i<6;i++){
        const a=i*1.05, rr=(1-b.t/0.3)*b.r*TW/2;
        ctx.fillRect(sx+Math.cos(a)*rr,sy-5-(1-b.t/0.3)*11+Math.sin(a)*rr*0.5,2.2,2.2);
      }
    }
  }
  if(S.phase==='prepDefense'){
    const [hx,hy]=S.hover;
    if(hx>=0){
      const ok=S.selTower&&canBuild(hx,hy);
      drawDiamond(ctx,hx,hy,raiseAt(hx,hy),ok?'rgba(120,200,90,0.4)':'rgba(200,80,60,0.35)','#fff');
      if(ok) drawRange(hx,hy,TOWERS[S.selTower].range+(hillSet.has(hx+','+hy)?0.5:0),'rgba(212,180,90,0.8)');
    }
    for(const t of S.towers) drawRange(t.x,t.y,TOWERS[t.type].range+(hillSet.has(t.x+','+t.y)?0.5:0),'rgba(212,180,90,0.25)');
  }
  if(S.phase==='prepAttack'||S.phase==='prepAttack2'){
    for(const k of keysOf(S.curAtt)){
      const col=k===S.selPath?'rgba(230,200,90,0.5)':'rgba(230,200,90,0.14)';
      for(const [x,y] of PATHS[k]) drawDiamond(ctx,x,y,raiseAt(x,y),col,null);
    }
  }
  // vrstvy fixní na obrazovce (neposouvají se se zoomem mapy)
  ctx.setTransform(SC,0,0,SC,0,0);
  if(S.phase==='prepAttack'||S.phase==='prepAttack2') drawAttackInfo();
}

/* ---------- Hlavní smyčka ---------- */
let last=performance.now();
function loop(now){
  let dt=Math.min(0.05,(now-last)/1000); last=now;
  animT+=dt;
  if(S.phase==='prepAttack'||S.phase==='prepAttack2'||S.phase==='prepDefense'){ tickTimer(dt); updateHud(); }
  if(S.phase==='battle'){ battleTick(dt*S.speed); updateHud(); }
  render();
  requestAnimationFrame(loop);
}
setupCanvas();
generateMap();
showMenu();
requestAnimationFrame(loop);
</script>
